<!DOCTYPE html>
<html lang="en">
<head>
    <title>MLT test harness</title>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.css' />
    <script src='https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.js'></script>
    <script src="https://unpkg.com/pmtiles@4.4.0/dist/pmtiles.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    const PMTILES_URL = 'monaco.pmtiles';

    const p = new pmtiles.PMTiles(PMTILES_URL);

    protocol.add(p);

    p.getHeader().then(h => {

        const map = new maplibregl.Map({
            container: 'map',
            hash: true,
            style: 'https://demotiles.maplibre.org/style.json',
            zoom: 14,
            center: [h.centerLon, h.centerLat],
        });

        map.showTileBoundaries = true;

        map.on('style.load', () => {
            map.addLayer({
                id: 'buildings',
                source: {
                    type: 'vector',
                    url: `pmtiles://${PMTILES_URL}`,
                    encoding: 'mlt'
                },
                'source-layer': 'buildings/building',
                type: 'fill',
                paint: {
                    'fill-color': 'steelblue'
                }
            });
        });
    });
</script>
</body>
</html>
